name: Serenity GPT Realtime API

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-brief-pages
  cancel-in-progress: false

jobs:
  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Restore current GitHub Pages content
        run: |
          set -euo pipefail
          mkdir -p daily_reports

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git --work-tree=daily_reports checkout origin/gh-pages -- . || true
            echo "Restored existing gh-pages snapshot"
          else
            echo "gh-pages does not exist yet; creating the first API snapshot"
          fi

      - name: Build GPT realtime API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERENITY_REPO: ${{ vars.SERENITY_REPO || 'yan-labs/serenity-aleabitoreddit' }}
          SERENITY_REF: ${{ vars.SERENITY_REF || 'main' }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        run: node scripts/build-gpt-api.mjs

      - name: Publish API to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./daily_reports
          publish_branch: gh-pages
          keep_files: false
          commit_message: 'api: refresh Serenity GPT context ${{ github.run_id }}'
